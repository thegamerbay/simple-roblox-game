name: Deploy Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Create Game Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install dependencies
        run: wally install

      - name: Build Place File
        run: rojo build -o SimpleRobloxGame.rbxl

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: SimpleRobloxGame.rbxl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # To automatically deploy the game directly to Roblox:
      # (You will need to create an API key in the Roblox Creator Dashboard and add it to Settings -> Secrets -> Actions)
      # 
      # - name: Publish to Roblox
      #   run: |
      #     rojo upload --asset_id YOUR_GAME_ID --api-key ${{ secrets.ROBLOX_API_KEY }}
