name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install dependencies
        run: wally install

      - name: Build Place File for Testing
        run: rojo build -o test.rbxlx

      # Replacing the old run-in-roblox installation
      - name: Install Tools
        run: |
          npm install -g run-in-roblox
          npm install -g @highcenburg/luau-coverage

      - name: Instrument code for coverage
        run: |
          luau-coverage install
          luau-coverage instrument src

      - name: Run Real Tests
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}
        run: run-in-roblox --place test.rbxlx --script scripts/run_tests.lua

      - name: Generate Coverage Data
        run: luau-coverage report --format lcov
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./lcov.info # luau-coverage generates lcov format
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Final Place File
        run: rojo build -o SimpleRobloxGame.rbxlx
