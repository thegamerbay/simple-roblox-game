name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install dependencies
        run: wally install

      - name: Build Place File for Testing
        run: rojo build -o test.rbxlx

      - name: Install Roblox Studio
        uses: DervexDev/setup-roblox-studio@v1.0.1
        with:
          cookie: ${{ secrets.ROBLOSECURITY }}
          token: ${{ secrets.GITHUB_TOKEN }}



      - name: Run Real Tests
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}
        run: run-in-roblox --place test.rbxlx --script scripts/run_tests.lua

      - name: Build Final Place File
        run: rojo build -o SimpleRobloxGame.rbxlx
