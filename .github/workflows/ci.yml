name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build & Run Tests (Open Cloud)
    runs-on: ubuntu-latest
    env:
      ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
    concurrency:
      group: luau-execution-${{ github.ref }}
      cancel-in-progress: false # Open Cloud API limits concurrent requests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install dependencies (Wally)
        run: wally install

      - name: Build Place File (.rbxl)
        run: rojo build default.project.json --output dist.rbxl

      - name: Upload & Run Tests
        if: ${{ env.ROBLOX_API_KEY != '' }}
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_UNIVERSE_ID: ${{ vars.ROBLOX_TEST_UNIVERSE_ID }}
          ROBLOX_PLACE_ID: ${{ vars.ROBLOX_TEST_PLACE_ID }}
        # Run the wrapper script, passing the place file and test script
        run: python3 scripts/python/upload_and_run_task.py dist.rbxl tasks/runTests.luau
