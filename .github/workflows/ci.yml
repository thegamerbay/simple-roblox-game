name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test:
    name: Build & Test
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install dependencies
        run: wally install

      - name: Build Place File for Testing
        run: rojo build -o test.rbxlx

      # Стабильный установщик Roblox Studio под Windows
      - name: Install Roblox Studio
        uses: OrbitalOwen/roblox-win-installer-action@1.1
        with:
          cookie: ${{ secrets.ROBLOSECURITY }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Real Tests
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}
        run: |
          lune run scripts/build_test_plugin.luau
          run-in-roblox run --place-file test.rbxlx --script run_tests.rbxmx --universe-id 1 --place-id 1 --creator-id 1 --creator-type 0

      - name: Build Final Place File
        run: rojo build -o SimpleRobloxGame.rbxlx
